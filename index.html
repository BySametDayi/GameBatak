<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 Balon Patlatmaca Macerası - 50 Bölüm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f2a, #1a1f3a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 1300px;
            height: 95vh;
            background: radial-gradient(circle at 30% 20%, #87CEEB, #2c5f8a);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 3px solid #ffd966;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }

        .ui-top {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 8px 20px;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }

        .ui-card {
            background: #000000aa;
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffefb0;
            font-weight: bold;
            font-size: 1rem;
            border: 1px solid #ffd966;
            font-family: monospace;
            pointer-events: auto;
        }

        .ui-card span {
            color: #ffaa44;
            font-size: 1.3rem;
        }

        .powerup-bar {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 10;
            flex-wrap: wrap;
            pointer-events: none;
        }

        .power-btn {
            pointer-events: auto;
            background: #2c2e1ecc;
            backdrop-filter: blur(8px);
            border: 2px solid #ffd966;
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffefb0;
            cursor: pointer;
            transition: 0.1s;
            font-family: monospace;
        }

        .power-btn:active {
            transform: scale(0.96);
        }

        .power-btn.disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            pointer-events: none;
        }

        .story-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000dd;
            backdrop-filter: blur(20px);
            color: #ffefb0;
            padding: 20px 30px;
            border-radius: 60px;
            text-align: center;
            z-index: 30;
            border: 2px solid gold;
            max-width: 80%;
            pointer-events: none;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
        }

        .boss-health {
            position: absolute;
            top: 80px;
            left: 20%;
            right: 20%;
            background: #550000cc;
            border-radius: 30px;
            padding: 5px;
            z-index: 12;
            border: 2px solid #ff4444;
            display: none;
        }

        .boss-health-bar {
            background: #ff3333;
            height: 20px;
            border-radius: 30px;
            width: 100%;
            transition: width 0.2s;
        }

        .restart-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: #ffaa33;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-family: inherit;
            box-shadow: 0 3px 0 #7a4c1a;
        }

        @media (max-width: 700px) {
            .ui-card { font-size: 0.7rem; padding: 4px 10px; }
            .power-btn { font-size: 0.7rem; padding: 4px 12px; }
            .story-box { font-size: 0.9rem; padding: 12px 18px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-top">
        <div class="ui-card">📖 BÖLÜM <span id="levelNumber">1</span> / 50</div>
        <div class="ui-card">🎯 HEDEF: <span id="targetCount">10</span></div>
        <div class="ui-card">💥 PATLATILAN: <span id="poppedCount">0</span></div>
        <div class="ui-card">❤️ CAN: <span id="livesValue">5</span></div>
        <div class="ui-card">⭐ PUAN: <span id="scoreValue">0</span></div>
    </div>
    <div class="powerup-bar">
        <div class="power-btn" id="slowPower">🐢 YAVAŞLAT (1)</div>
        <div class="power-btn" id="doublePower">⚡ ÇİFT PATLAT (1)</div>
        <div class="power-btn" id="healPower">💚 CAN DOLDUR (1)</div>
    </div>
    <div class="boss-health" id="bossHealthContainer">
        <div style="display:flex; justify-content:space-between; padding:0 8px; color:white;">👑 BOSS PATLAGON 👑 <span id="bossHpText">100%</span></div>
        <div class="boss-health-bar" id="bossHealthBar"></div>
    </div>
    <div class="story-box" id="storyBox"></div>
    <button class="restart-btn" id="restartBtn">🔄 YENİDEN BAŞLA</button>
</div>

<script>
    (function(){
        // ---------- DOM ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelSpan = document.getElementById('levelNumber');
        const targetSpan = document.getElementById('targetCount');
        const poppedSpan = document.getElementById('poppedCount');
        const livesSpan = document.getElementById('livesValue');
        const scoreSpan = document.getElementById('scoreValue');
        const storyBox = document.getElementById('storyBox');
        const bossContainer = document.getElementById('bossHealthContainer');
        const bossHpText = document.getElementById('bossHpText');
        const bossHealthBar = document.getElementById('bossHealthBar');
        const slowBtn = document.getElementById('slowPower');
        const doubleBtn = document.getElementById('doublePower');
        const healBtn = document.getElementById('healPower');
        const restartBtn = document.getElementById('restartBtn');

        let width, height;
        let gameRunning = true;
        let level = 1;
        let targetToPop = 10;
        let poppedInLevel = 0;
        let lives = 5;
        let totalScore = 0;
        let balloons = [];
        let slowActive = false;
        let slowTimer = null;
        let doubleActive = false;
        let doubleTimer = null;
        let powerSlowCount = 1;
        let powerDoubleCount = 1;
        let powerHealCount = 1;
        let isBossLevel = false;
        let bossHealth = 100;
        let bossMaxHealth = 100;
        let spawnInterval = null;
        let animationId = null;
        let lastFrameTime = 0;
        
        // Renkler
        const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#FF9F4A','#B5EAD7','#C7CEE6','#F6AE9A','#FFB7B2','#A0E7E5','#FF85B3'];
        
        // Hikaye metinleri
        const stories = {
            1: "🎈 Şeker Diyarı tehlikede! Balon Kralı Patlagon işgal etti. Patlatmaya başla!",
            10: "⚔️ İlk boss savaşı! Patlagon'un yardımcısı Dev Balon geliyor!",
            20: "🔥 Karanlık Balon Ordusu ortaya çıktı! Daha hızlılar!",
            30: "❄️ Buz Balonları! Daha dayanıklılar (2 vuruş gerekir)",
            40: "💀 Patlagon'un kalesine yaklaşıyorsun! Son viraj!",
            50: "👑 SON BOSS: KRAL PATLAGON! Tüm güçlerini kullan!"
        };
        
        function showStory(text, duration=2500) {
            storyBox.style.display = 'block';
            storyBox.innerText = text;
            setTimeout(() => {
                if(storyBox.innerText === text) storyBox.style.display = 'none';
            }, duration);
        }
        
        function updateUI() {
            levelSpan.innerText = level;
            targetSpan.innerText = targetToPop;
            poppedSpan.innerText = poppedInLevel;
            livesSpan.innerText = lives;
            scoreSpan.innerText = totalScore;
            slowBtn.innerText = `🐢 YAVAŞLAT (${powerSlowCount})`;
            doubleBtn.innerText = `⚡ ÇİFT PATLAT (${powerDoubleCount})`;
            healBtn.innerText = `💚 CAN DOLDUR (${powerHealCount})`;
            if(powerSlowCount === 0) slowBtn.classList.add('disabled');
            else slowBtn.classList.remove('disabled');
            if(powerDoubleCount === 0) doubleBtn.classList.add('disabled');
            else doubleBtn.classList.remove('disabled');
            if(powerHealCount === 0) healBtn.classList.add('disabled');
            else healBtn.classList.remove('disabled');
        }
        
        function getBaseSpeed() {
            let speed = 40 + (level-1) * 2.5;
            if(slowActive) speed *= 0.4;
            if(isBossLevel) speed *= 1.3;
            return Math.min(speed, 150);
        }
        
        function getSpawnInterval() {
            let interval = Math.max(400, 1100 - (level-1) * 12);
            if(isBossLevel) interval = Math.max(200, interval * 0.7);
            if(slowActive) interval *= 1.4;
            return interval;
        }
        
        class Balloon {
            constructor(isBossBalloon = false, isIce = false) {
                this.radius = isBossBalloon ? 55 : (25 + Math.random() * 15);
                this.x = 40 + Math.random() * (width - 80);
                this.y = height + this.radius + 5;
                let spd = getBaseSpeed() * (0.7 + Math.random() * 0.8);
                if(isBossBalloon) spd *= 0.5;
                this.speedY = spd;
                this.color = isIce ? '#A8D8FF' : colors[Math.floor(Math.random()*colors.length)];
                this.isIce = isIce;
                this.iceHits = isIce ? 2 : 1;
                this.isBossBalloon = isBossBalloon;
            }
        }
        
        function addBalloon() {
            if(!gameRunning) return;
            if(balloons.length > 60) return;
            let isIce = (level >= 30 && !isBossLevel && Math.random() < 0.25);
            let isBossMini = (isBossLevel && Math.random() < 0.2);
            balloons.push(new Balloon(isBossMini, isIce));
        }
        
        function popBalloonAt(clientX, clientY) {
            if(!gameRunning) return false;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            let popped = false;
            for(let i=balloons.length-1; i>=0; i--) {
                const b = balloons[i];
                const dx = canvasX - b.x;
                const dy = canvasY - b.y;
                if(Math.hypot(dx,dy) < b.radius) {
                    if(b.isIce && b.iceHits === 2) {
                        b.iceHits = 1;
                        b.color = '#FFAA88';
                        popped = true;
                        break;
                    }
                    balloons.splice(i,1);
                    if(b.isBossBalloon && isBossLevel) {
                        bossHealth -= 8;
                        if(bossHealth <= 0) levelComplete();
                        updateBossUI();
                    } else {
                        let addCount = doubleActive ? 2 : 1;
                        for(let p=0; p<addCount; p++) {
                            poppedInLevel++;
                            totalScore += 10 + Math.floor(level/2);
                        }
                        updateUI();
                        if(poppedInLevel >= targetToPop && !isBossLevel) levelComplete();
                    }
                    popped = true;
                    playPopSound();
                    break;
                }
            }
            return popped;
        }
        
        function updateBossUI() {
            if(isBossLevel) {
                let percent = (bossHealth / bossMaxHealth) * 100;
                bossHpText.innerText = Math.floor(percent)+'%';
                bossHealthBar.style.width = percent+'%';
                if(bossHealth <= 0) levelComplete();
            }
        }
        
        function levelComplete() {
            if(!gameRunning) return;
            if(spawnInterval) clearInterval(spawnInterval);
            gameRunning = false;
            let bonus = Math.floor((targetToPop - poppedInLevel) * 5);
            if(bonus<0) bonus=0;
            totalScore += bonus;
            showStory(`🎉 Bölüm ${level} geçildi! +${bonus} bonus puan!`, 1800);
            setTimeout(() => {
                level++;
                if(level > 50) {
                    gameWin();
                    return;
                }
                resetLevel();
            }, 2000);
        }
        
        function gameWin() {
            showStory("🏆 TEBRİKLER! Şeker Diyarı'nı kurtardın! KRALİÇE seni onurlandırıyor. 🏆", 5000);
            if(spawnInterval) clearInterval(spawnInterval);
            gameRunning = false;
            cancelAnimationFrame(animationId);
        }
        
        function resetLevel() {
            balloons = [];
            poppedInLevel = 0;
            gameRunning = true;
            isBossLevel = (level % 10 === 0);
            if(isBossLevel) {
                targetToPop = 0;
                bossHealth = 100 + (Math.floor(level/10) * 30);
                bossMaxHealth = bossHealth;
                bossContainer.style.display = 'block';
                updateBossUI();
                showStory(stories[level] || `👾 BOSS SAVAŞI! Patlagon'un ${Math.floor(level/10)}. generali!`, 2000);
                for(let i=0;i<5;i++) addBalloon();
            } else {
                bossContainer.style.display = 'none';
                targetToPop = Math.min(15 + Math.floor(level/3), 45);
                showStory(stories[level] || `Bölüm ${level}: ${targetToPop} balon patlat!`, 1500);
                for(let i=0;i<4;i++) addBalloon();
            }
            updateUI();
            if(spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if(gameRunning && balloons.length < 70) addBalloon();
            }, getSpawnInterval());
            cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(drawLoop);
        }
        
        function looseLife() {
            if(!gameRunning) return;
            lives--;
            updateUI();
            showStory(`💔 Can kaybettin! Kalan can: ${lives}`, 800);
            if(lives <= 0) gameOver();
        }
        
        function gameOver() {
            gameRunning = false;
            if(spawnInterval) clearInterval(spawnInterval);
            showStory(`💀 OYUN BİTTI! Bölüm ${level}de kaybettin. Yeniden başlat butonuna bas.`, 4000);
            cancelAnimationFrame(animationId);
        }
        
        function restartGame() {
            level = 1;
            lives = 5;
            totalScore = 0;
            powerSlowCount = 1;
            powerDoubleCount = 1;
            powerHealCount = 1;
            if(slowActive) { slowActive=false; if(slowTimer) clearTimeout(slowTimer); }
            if(doubleActive) { doubleActive=false; if(doubleTimer) clearTimeout(doubleTimer); }
            isBossLevel = false;
            gameRunning = true;
            resetLevel();
        }
        
        function useSlow() {
            if(powerSlowCount<=0 || !gameRunning) return;
            powerSlowCount--;
            slowActive = true;
            if(slowTimer) clearTimeout(slowTimer);
            slowTimer = setTimeout(() => { slowActive = false; updateUI(); showStory("Yavaşlatma bitti!", 800); }, 7000);
            updateUI();
            showStory("🐢 Balonlar yavaşladı! (7 saniye)", 1200);
            if(spawnInterval) { clearInterval(spawnInterval); spawnInterval = setInterval(()=>{ if(gameRunning) addBalloon(); }, getSpawnInterval()); }
        }
        
        function useDouble() {
            if(powerDoubleCount<=0 || !gameRunning) return;
            powerDoubleCount--;
            doubleActive = true;
            if(doubleTimer) clearTimeout(doubleTimer);
            doubleTimer = setTimeout(() => { doubleActive = false; updateUI(); showStory("Çift patlatma bitti", 800); }, 8000);
            updateUI();
            showStory("⚡ Her balon 2x puan! (8 saniye)", 1200);
        }
        
        function useHeal() {
            if(powerHealCount<=0 || !gameRunning) return;
            powerHealCount--;
            lives = Math.min(lives+2, 8);
            updateUI();
            showStory("💚 Can yenilendi! +2 can", 1200);
        }
        
        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 1200; gain.gain.value = 0.08;
                osc.type = 'triangle';
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.2);
                osc.stop(audioCtx.currentTime+0.2);
                setTimeout(()=>audioCtx.close(), 250);
            } catch(e) {}
        }
        
        // DRAW
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
        }
        
        function drawLoop(now) {
            if(!lastFrameTime) lastFrameTime = now;
            let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            if(gameRunning && delta > 0) {
                for(let i=0; i<balloons.length; i++) {
                    balloons[i].y -= balloons[i].speedY * delta;
                    if(balloons[i].y + balloons[i].radius < 0) {
                        balloons.splice(i,1);
                        if(!isBossLevel && gameRunning) looseLife();
                        i--;
                        if(!gameRunning) break;
                    }
                }
            }
            drawCanvas();
            if(gameRunning) animationId = requestAnimationFrame(drawLoop);
        }
        
        function drawCanvas() {
            ctx.clearRect(0,0,width,height);
            ctx.fillStyle = '#9acd32aa';
            ctx.fillRect(0, height-35, width, 45);
            for(let b of balloons) {
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.radius-6);
                ctx.lineTo(b.x-4, b.y + b.radius+10); ctx.lineTo(b.x+4, b.y + b.radius+10);
                ctx.fillStyle = '#8B5A2B'; ctx.fill();
                ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = b.color; ctx.fill();
                ctx.strokeStyle = 'white'; ctx.stroke();
                ctx.beginPath(); ctx.arc(b.x-4, b.y-4, b.radius*0.2, 0, Math.PI*2);
                ctx.fillStyle = '#ffffffcc'; ctx.fill();
                if(b.isIce && b.iceHits===2) {
                    ctx.fillStyle = '#88ccffcc'; ctx.font = 'bold 18px monospace';
                    ctx.fillText('❄️', b.x-12, b.y-10);
                }
                if(b.isBossBalloon && isBossLevel) {
                    ctx.fillStyle = '#ff0000cc'; ctx.font = 'bold 20px monospace';
                    ctx.fillText('👑', b.x-15, b.y-15);
                }
                ctx.shadowBlur = 0;
            }
            if(!gameRunning && lives>0 && level<=50) {
                ctx.font = 'bold 32px monospace'; ctx.fillStyle = '#fff3b0';
                ctx.fillText('⏳ Bölüm geçiliyor...', width/2-150, height/2);
            }
        }
        
        // EVENT
        function handleTap(e) {
            if(!gameRunning) return;
            let cx, cy;
            if(e.touches) { e.preventDefault(); cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            popBalloonAt(cx, cy);
        }
        
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', handleTap, {passive:false});
        window.addEventListener('resize', ()=>{ resizeCanvas(); drawCanvas(); });
        slowBtn.addEventListener('click', useSlow);
        doubleBtn.addEventListener('click', useDouble);
        healBtn.addEventListener('click', useHeal);
        restartBtn.addEventListener('click', ()=>{ if(spawnInterval) clearInterval(spawnInterval); restartGame(); });
        
        resizeCanvas();
        resetLevel();
        showStory(stories[1] || "🎈 Şeker Diyarı'nı kurtarmak için balonları patlat!", 3000);
    })();
</script>
</body>
</html>
