<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 Balon Patlatmaca Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b3b5f, #1b7f9e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 95vh;
            background: radial-gradient(circle at 30% 10%, #a2e0f0, #3a8cba);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 4px solid #ffdd99;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
            touch-action: none;
        }

        .ui-panel {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 25px;
            background: #000000aa;
            backdrop-filter: blur(10px);
            border-radius: 60px;
            margin: 0 20px;
            color: white;
            font-weight: bold;
            font-size: 1.4rem;
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 1px;
            border: 1px solid #ffd966;
        }

        .score-box, .lives-box, .level-box {
            background: #1e2a2ecc;
            padding: 6px 18px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .restart-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #ffaa33;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            font-family: inherit;
            box-shadow: 0 4px 0 #7a4c1a;
            transition: 0.07s linear;
            pointer-events: auto;
            color: #2c2e1e;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4c1a;
        }

        .game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000cc;
            backdrop-filter: blur(15px);
            color: gold;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 20px 35px;
            border-radius: 70px;
            text-align: center;
            white-space: nowrap;
            z-index: 25;
            border: 2px solid #ffd966;
            pointer-events: none;
            font-family: monospace;
        }

        @media (max-width: 700px) {
            .ui-panel {
                font-size: 1rem;
                padding: 6px 15px;
            }
            .game-message {
                font-size: 1.4rem;
                padding: 12px 20px;
                white-space: nowrap;
            }
            .restart-btn {
                font-size: 0.9rem;
                padding: 6px 15px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="ui-panel">
        <div class="score-box">🎈 SKOR: <span id="scoreValue">0</span></div>
        <div class="lives-box">❤️ CAN: <span id="livesValue">3</span></div>
        <div class="level-box">⭐ SEVİYE: <span id="levelValue">1</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <button class="restart-btn" id="restartButton">🎈 YENİ OYUN</button>
    <div id="gameMessage" class="game-message" style="display: none;"></div>
</div>

<script>
    (function(){
        // --- DOM ELEMANLARI ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const restartBtn = document.getElementById('restartButton');
        const messageDiv = document.getElementById('gameMessage');

        // --- OYUN AYARLARI ---
        let width, height;
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameOver = false;
        let animationId = null;
        
        // Balon dizisi
        let balloons = [];
        
        // Balon renkleri (canlı pastel)
        const colors = [
            '#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F4A', '#B5EAD7', 
            '#C7CEE6', '#F6AE9A', '#B8F2E6', '#FFB7B2', '#A0E7E5'
        ];
        
        // --- SEVİYE BAŞINA BALON HIZI (düşme hızı px/saniye) ---
        function getBaseSpeed(){
            return 45 + (level-1) * 12; // seviye 1 -> 45, 5.seviye -> 93
        }
        
        // BALON ÜRETME ARALIĞI (ms) - seviye düştükçe daha sık
        let spawnInterval = null;
        
        // Canvas yeniden boyutlandırma
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const rect = wrapper.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
        }
        
        // Yeni balon oluştur
        function createBalloon() {
            const radius = 28 + Math.random() * 14;  // 28-42px arası
            const x = 30 + Math.random() * (width - 60);
            const y = height + radius + 5;  // aşağıdan başlat
            const speedY = getBaseSpeed() * (0.8 + Math.random() * 0.7); // biraz varyasyon
            const color = colors[Math.floor(Math.random() * colors.length)];
            const id = Math.random();
            return {
                id, x, y, radius,
                speedY,
                color,
                pop: false
            };
        }
        
        // Balon ekle
        function addBalloon() {
            if(gameOver) return;
            if(balloons.length < 45) {  // max 45 balon performans
                balloons.push(createBalloon());
            }
        }
        
        // Balon patlatma (tıklama / dokunma kontrolü)
        function popBalloonAt(mouseX, mouseY) {
            if(gameOver) return false;
            let popped = false;
            // tersten dönüyoruz çünkü en üstteki balon öncelikli hissi
            for(let i=balloons.length-1; i>=0; i--) {
                const b = balloons[i];
                const dx = mouseX - b.x;
                const dy = mouseY - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < b.radius) {
                    // patlat!
                    balloons.splice(i,1);
                    score++;
                    updateScoreUI();
                    popped = true;
                    
                    // seviye kontrolü (her 10 puanda seviye atla)
                    const newLevel = 1 + Math.floor(score / 10);
                    if(newLevel > level && !gameOver) {
                        level = newLevel;
                        updateLevelUI();
                        showFloatingMessage(`⚡ SEVİYE ${level} ⚡`, 800);
                        // spawn aralığını yeniden ayarla
                        resetSpawnInterval();
                    }
                    break; // bir tıklamada sadece bir balon patlasın
                }
            }
            if(popped) playPopSound();
            return popped;
        }
        
        // basit pop sesi (AudioContext ile tık)
        function playPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.15;
                oscillator.type = 'sine';
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                oscillator.stop(audioCtx.currentTime + 0.25);
                // kullanıcı etkileşimi sonrası otomatik kapanır
                setTimeout(() => { audioCtx.close().catch(e=>{}); }, 300);
            } catch(e) { /* sessiz */ }
        }
        
        // UI Güncellemeleri
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        function updateLivesUI() {
            livesSpan.innerText = lives;
        }
        function updateLevelUI() {
            levelSpan.innerText = level;
        }
        
        // Can kaybı
        function loseLife() {
            if(gameOver) return;
            lives--;
            updateLivesUI();
            showFloatingMessage(`💔 CAN KAYBETTİN! ${lives}`, 600);
            if(lives <= 0) {
                gameOver = true;
                if(spawnInterval) clearInterval(spawnInterval);
                spawnInterval = null;
                showGameOver();
            }
        }
        
        // Ekran mesajı (geçici)
        function showFloatingMessage(msg, duration=700) {
            const msgDiv = document.getElementById('gameMessage');
            if(!msgDiv) return;
            msgDiv.style.display = 'block';
            msgDiv.innerText = msg;
            setTimeout(() => {
                if(msgDiv.innerText === msg) msgDiv.style.display = 'none';
            }, duration);
        }
        
        function showGameOver() {
            if(!gameOver) return;
            if(spawnInterval) clearInterval(spawnInterval);
            spawnInterval = null;
            const msgDiv = document.getElementById('gameMessage');
            msgDiv.style.display = 'block';
            msgDiv.innerText = `🎈 GAME OVER 🎈\nSkor: ${score}  Seviye: ${level}`;
            msgDiv.style.whiteSpace = 'pre-line';
            msgDiv.style.fontSize = '1.8rem';
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        // Spawn aralığını seviyeye göre ayarla (yüksek seviyede balon daha sık)
        function resetSpawnInterval() {
            if(spawnInterval) clearInterval(spawnInterval);
            if(gameOver) return;
            let intervalMs = Math.max(300, 1100 - (level-1) * 50);
            intervalMs = Math.min(intervalMs, 1600);
            spawnInterval = setInterval(() => {
                if(!gameOver && balloons.length < 50) {
                    addBalloon();
                    // bazen çift balon (eğlence)
                    if(level >= 3 && Math.random()<0.25 && balloons.length<48) addBalloon();
                }
            }, intervalMs);
        }
        
        // Oyunu sıfırla
        function restartGame() {
            gameOver = false;
            score = 0;
            lives = 3;
            level = 1;
            balloons = [];
            updateScoreUI();
            updateLivesUI();
            updateLevelUI();
            // mesaj gizle
            const msgDiv = document.getElementById('gameMessage');
            msgDiv.style.display = 'none';
            msgDiv.style.whiteSpace = 'nowrap';
            msgDiv.style.fontSize = '';
            
            if(spawnInterval) clearInterval(spawnInterval);
            resetSpawnInterval();
            
            // ilk başlangıçta birkaç balon ekle
            for(let i=0;i<5;i++) addBalloon();
            if(animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(drawLoop);
        }
        
        // --- ÇİZİM (ANİMASYON) + FIRSATÇA BALON YUKARI HAREKETİ---
        let lastTimestamp = 0;
        let lastFrameTime = 0;
        
        function drawLoop(nowMs) {
            if(!lastFrameTime) lastFrameTime = nowMs;
            let delta = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
            if(delta <= 0) delta = 1/60;
            lastFrameTime = nowMs;
            
            if(!gameOver) {
                // balonları hareket ettir (yukarı doğru)
                for(let i=0; i<balloons.length; i++) {
                    const b = balloons[i];
                    b.y -= b.speedY * delta;
                    // ekranın üstünden çıkmışsa can kaybı ve balonu sil
                    if(b.y + b.radius < 0) {
                        balloons.splice(i,1);
                        if(!gameOver) loseLife();
                        i--;
                        if(gameOver) break;
                    }
                }
                // eğer oyun bitti ise döngü durdurulabilir
                if(gameOver) {
                    if(spawnInterval) clearInterval(spawnInterval);
                    spawnInterval = null;
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    drawCanvasStatic(); // oyun bitti ekranını çiz
                    return;
                }
            }
            drawCanvasStatic();
            if(!gameOver) animationId = requestAnimationFrame(drawLoop);
            else if(gameOver) drawCanvasStatic();
        }
        
        function drawCanvasStatic() {
            if(!ctx) return;
            ctx.clearRect(0,0,width,height);
            // çimen efekti
            ctx.fillStyle = '#9acd32aa';
            ctx.fillRect(0, height-35, width, 45);
            ctx.fillStyle = '#6b8e23cc';
            ctx.fillRect(0, height-28, width, 28);
            
            // balonları çiz (ip + gövde)
            for(let b of balloons) {
                // ip
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.radius-6);
                ctx.lineTo(b.x-4, b.y + b.radius + 12);
                ctx.lineTo(b.x+4, b.y + b.radius + 12);
                ctx.fillStyle = '#8B5A2B';
                ctx.fill();
                // balon gövde gölge
                ctx.shadowColor = "rgba(0,0,0,0.2)";
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.strokeStyle = "#ffffffaa";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // parlaklık efekti
                ctx.beginPath();
                ctx.arc(b.x-5, b.y-5, b.radius*0.25, 0, Math.PI*2);
                ctx.fillStyle = "#ffffffcc";
                ctx.fill();
                ctx.shadowBlur = 0;
                // küçük fiyonk / düğüm
                ctx.fillStyle = "#c77e3e";
                ctx.beginPath();
                ctx.ellipse(b.x, b.y + b.radius-4, 6, 3, 0, 0, Math.PI*2);
                ctx.fill();
            }
            // eğer oyun bitti ve can 0 ise son mesaj
            if(gameOver && lives <=0) {
                ctx.font = 'bold 36px "Segoe UI"';
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fffaec';
                ctx.shadowColor = 'black';
                ctx.fillText('💥 OYUN BİTTİ 💥', width/2-130, height/2-40);
                ctx.font = '24px monospace';
                ctx.fillStyle = '#fff3b0';
                ctx.fillText(`Skor: ${score}   Seviye: ${level}`, width/2-120, height/2+30);
            }
        }
        
        // --- OLAY DİNLEYİCİLER ---
        function handleTap(e) {
            if(gameOver) return;
            let clientX, clientY;
            if(e.touches) {
                e.preventDefault();
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            if(canvasX>=0 && canvasX<=width && canvasY>=0 && canvasY<=height) {
                popBalloonAt(canvasX, canvasY);
            }
        }
        
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', handleTap, {passive: false});
        window.addEventListener('resize', () => {
            resizeCanvas();
            drawCanvasStatic();
        });
        restartBtn.addEventListener('click', () => {
            if(spawnInterval) clearInterval(spawnInterval);
            restartGame();
        });
        
        // Başlangıç
        resizeCanvas();
        restartGame();
        // bulut efekti için ekstra başlangıç balonu
        setTimeout(() => {
            if(!gameOver) for(let i=0;i<3;i++) addBalloon();
        }, 200);
        
    })();
</script>
</body>
</html>
